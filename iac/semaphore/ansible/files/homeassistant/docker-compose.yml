services:
  homeassistant:
    container_name: homeassistant
    image: ghcr.io/home-assistant/home-assistant:stable
    restart: unless-stopped
    network_mode: host
    privileged: true
    environment:
      - TZ=America/Chicago
    volumes:
      - config:/config
    devices:
      - /dev/ttyUSB0:/dev/ttyUSB0
      - /dev/ttyUSB1:/dev/ttyUSB1

  matter-server:
    container_name: matter-server
    image: ghcr.io/matter-js/python-matter-server:stable
    restart: unless-stopped
    network_mode: host
    security_opt:
      - apparmor:unconfined
    volumes:
      - matter-data:/data
      - /run/dbus:/run/dbus:ro

  esphome:
    container_name: esphome
    image: ghcr.io/esphome/esphome:stable
    restart: unless-stopped
    network_mode: host
    privileged: true
    environment:
      - TZ=America/Chicago
    volumes:
      - esphome-config:/config

  zwavejs:
    container_name: zwavejs
    image: zwavejs/zwave-js-ui:latest
    restart: unless-stopped
    network_mode: host
    environment:
      - TZ=America/Chicago
    volumes:
      - zwavejs-config:/usr/src/app/store
    devices:
      - /dev/ttyUSB0:/dev/zwave

volumes:
  config:
  matter-data:
  esphome-config:
  zwavejs-config:
