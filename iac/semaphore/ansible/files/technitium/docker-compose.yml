services:
  dns-server:
    container_name: Technitium
    hostname: dns01
    image: docker.io/technitium/dns-server:latest
    healthcheck:
      test: timeout 10s bash -c ':> /dev/tcp/127.0.0.1/5380' || exit 1
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 90s
    ports:
      - "5380:5380/tcp" #DNS web console (HTTP)
      - "53443:53443/tcp" #DNS web console (HTTPS)
      - "53:53/udp" #DNS service
      - "53:53/tcp" #DNS service
    environment:
      - DNS_SERVER_DOMAIN=joeloveless.net
      - DNS_SERVER_LOG_FOLDER_PATH=/opt/technitium/logs
      TZ: America/Chicago
    volumes:
      - config:/etc/dns:rw
      - logs:/opt/technitium/logs
    restart: on-failure:5
    sysctls:
      - net.ipv4.ip_local_port_range=1024 65535

volumes:
  config:
  logs:
