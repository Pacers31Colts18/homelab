---
- name: Install and Configure Docker
  hosts: all
  become: true
  tasks:
    # Install Docker
    - name: Install prerequisites
      apt:
        name:
          - ca-certificates
          - curl
          - gnupg
        state: present
        update_cache: true

    - name: Create keyrings directory
      file:
        path: /etc/apt/keyrings
        state: directory
        mode: "0755"

    - name: Add Docker GPG key
      shell: curl -fsSL https://download.docker.com/linux/ubuntu/gpg | gpg --dearmor -o /etc/apt/keyrings/docker.gpg
      args:
        creates: /etc/apt/keyrings/docker.gpg

    - name: Set GPG key permissions
      file:
        path: /etc/apt/keyrings/docker.gpg
        mode: "0644"

    - name: Add Docker repository
      apt_repository:
        repo: "deb [arch=amd64 signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
        filename: docker
        state: present

    - name: Install Docker packages
      apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-buildx-plugin
          - docker-compose-plugin
        state: present
        update_cache: true

    - name: Enable and start Docker
      systemd:
        name: docker
        enabled: true
        state: started

    - name: Add user to docker group
      user:
        name: jloveless123
        groups: docker
        append: true

    # Configure secondary disk
    - name: Format secondary disk
      filesystem:
        fstype: ext4
        dev: /dev/sdb

    - name: Create mount point
      file:
        path: "/opt/pve00/{{ ansible_hostname }}"
        state: directory

    - name: Mount secondary disk
      mount:
        path: "/opt/pve00/{{ ansible_hostname }}"
        src: /dev/sdb
        fstype: ext4
        opts: defaults
        passno: "2"
        state: mounted

    - name: Set ownership
      file:
        path: "/opt/pve00/{{ ansible_hostname }}"
        owner: jloveless123
        group: jloveless123
        recurse: true

    # Point Docker to secondary disk
    - name: Create Docker data directory
      file:
        path: "/opt/pve00/{{ ansible_hostname }}/docker"
        state: directory
        owner: jloveless123
        group: jloveless123

    - name: Configure Docker data-root
      copy:
        dest: /etc/docker/daemon.json
        content: |
          {
            "data-root": "/opt/pve00/{{ ansible_hostname }}/docker"
          }

    - name: Restart Docker
      systemd:
        name: docker
        state: restarted

    - name: Set ownership after Docker restart
      file:
        path: "/opt/pve00/{{ ansible_hostname }}"
        owner: jloveless123
        group: jloveless123
        recurse: true
