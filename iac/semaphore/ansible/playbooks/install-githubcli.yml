---
- name: Install GitHub CLI
  hosts: all
  become: true
  tasks:
    - name: Install wget
      apt:
        name: wget
        state: present
        update_cache: true

    - name: Create keyrings directory
      file:
        path: /etc/apt/keyrings
        state: directory
        mode: "0755"

    - name: Add GitHub CLI GPG key
      shell: wget -nv -O- https://cli.github.com/packages/githubcli-archive-keyring.gpg | tee /etc/apt/keyrings/githubcli-archive-keyring.gpg > /dev/null
      args:
        creates: /etc/apt/keyrings/githubcli-archive-keyring.gpg

    - name: Set GPG key permissions
      file:
        path: /etc/apt/keyrings/githubcli-archive-keyring.gpg
        mode: "0644"

    - name: Add GitHub CLI repository
      apt_repository:
        repo: "deb [arch=amd64 signed-by=/etc/apt/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main"
        filename: github-cli
        state: present

    - name: Install GitHub CLI
      apt:
        name: gh
        state: present
        update_cache: true
