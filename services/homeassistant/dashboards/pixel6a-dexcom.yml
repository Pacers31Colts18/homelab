title: CGM Display
kiosk_mode:
  kiosk: true
views:
  - title: CGM
    path: cgm
    panel: true
    subview: true
    cards:
      - type: custom:button-card
        entity: sensor.dexcom_glucose_value
        show_icon: false
        show_name: false
        show_state: false
        custom_fields:
          reading: |
            [[[
              const g = entity.state;
              const gInt = parseInt(g);
              const color =
                gInt < 70 ? '#ff3b3b' :
                gInt <= 180 ? '#00ff88' :
                '#ffb347';

              const t = (states['sensor.dexcom_glucose_trend']?.state || '').toLowerCase();
              const arrow =
                t.includes('double') && t.includes('up') ? '⇈' :
                t.includes('forty') && t.includes('up') ? '↗' :
                t.includes('up') || t.includes('rise') ? '↑' :
                t.includes('double') && t.includes('down') ? '⇊' :
                t.includes('forty') && t.includes('down') ? '↘' :
                t.includes('down') || t.includes('fall') ? '↓' :
                t.includes('flat') || t.includes('steady') ? '→' :
                '·';

              return `
                <div style="
                  display:flex;
                  align-items:center;
                  justify-content:center;
                  height:100vh;
                  width:100%;
                  gap:0.15em;
                ">
                  <span style="
                    font-size:14rem;
                    font-weight:800;
                    line-height:0.85;
                    color:${color};
                  ">${g}</span>
                  <span style="
                    font-size:10rem;
                    line-height:0.85;
                    color:${color};
                    transform:translateY(-0.06em);
                  ">${arrow}</span>
                </div>
              `;
            ]]]
        styles:
          card:
            - height: 100vh
            - border-radius: 0px
            - background: black
            - box-shadow: none
            - border: none
            - margin: 0
            - padding: 0
          grid:
            - grid-template-areas: '"reading"'
            - justify-items: center
            - align-items: center
          custom_fields:
            reading:
              - width: 100%
              - height: 100vh
              - display: flex
              - justify-content: center
              - align-items: center
